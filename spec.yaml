    partial:
      gdf_dict: ${{ workflow.annotate_comm_gdf_dict.return }}
      styles:
        Conservancy:
          extruded: false
          get_fill_color: [169, 169, 169]
          get_line_color: [169, 169, 169]
          get_line_width: 4.00
          stroked: true
          filled: false
          opacity: 0.95

        Conservancy Herd Zone:
          extruded: false
          get_fill_color: [173, 255, 47]
          get_line_color: [173, 255, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 1:
          extruded: false
          get_fill_color: [85, 107, 47]
          get_line_color: [85, 107, 47]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 2:
          extruded: false
          get_fill_color: [0, 139, 139]
          get_line_color: [0, 139, 139]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

        Grazing Zone 3:
          extruded: false
          get_fill_color: [0, 100, 0]
          get_line_color: [0, 100, 0]
          get_line_width: 1.95
          stroked: true
          filled: true
          opacity: 0.15

