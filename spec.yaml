  # patrol observations 
  - name: Rename column values in participants
    id: rename_participants 
    task: map_name_values 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_patrol_info.return }}
      column: participants 
  
  - name: Filter non empty values from patrols info
    id: filter_null_patrols
    task: filter_non_empty_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.rename_participants.return }}
      column: patrol_id 
    
  - name: Replace transport type nulls with unspecified
    id: replace_transport_unspecified 
    task: replace_missing_with_label 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.filter_null_patrols.return }}
      columns: 
