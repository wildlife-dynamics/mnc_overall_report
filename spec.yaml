    partial:
      groupby_cols:
        - patrol_type_value
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
        - display_name: average_speed 
          aggregator: mean 
          column: speed_kmhr
      reset_index: true
      df: ${{ workflow.rename_motor_trajs.return }}

  - name: Add totals row to motorbike patrols
    id: add_mb_metrics_totals
    task: add_totals_row
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      label_col: 
        - patrol_type_value
      label: Total 
      df: ${{ workflow.motor_patrol_metrics.return }}

  - name: Persist motorbike patrol metrics
    id: persist_motor_df
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_mb_metrics_totals.return }}
      filename: motorbike_patrol_efforts

  - name: Apply Colormap to motor patrols
    id: apply_motor_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: patrol_type_value
      output_column_name: motor_patrol_colors
      colormap: tab20
      df: ${{ workflow.rename_motor_trajs.return }}

  - name: Filter patrol columns for motor trajs 
    id: filter_motor_trajs 
    task: filter_columns 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.apply_motor_colormap.return }}
      columns: [
        "geometry",
        "motor_patrol_colors",
        "patrol_type_value"
      ]
      exclude: null

  - name: Persist motor patrols as geojson
    id: persist_motor_geojson
    task: gdf_to_geojson
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      df: ${{ workflow.apply_motor_colormap.return }}
      filename: motor_patrol_trajectories

  - name: Generate motor patrol layers
    id: generate_motor_layers
    task: create_geojson_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style:
        filled: true 
        stroked: true 
        extruded: false 
        wireframe: false
        get_fill_color: "properties.motor_patrol_colors"
        get_line_color: "properties.motor_patrol_colors"
        opacity: 0.55 
        get_line_width: 1.55
        get_elevation: 0
        get_point_radius: 1
        line_width_units: pixels 
        line_width_scale: 1 
        line_width_min_pixels: 1
        line_width_max_pixels: 5
      legend:
        title: Patrol Type
        label_column: patrol_type_value
        color_column: motor_patrol_colors
        sort: ascending
      geodataframe: ${{ workflow.apply_motor_colormap.return }}
      data_url: ${{ workflow.persist_motor_geojson.return }}

  - name: Combine styled layers with motorbike layers
    id: combine_motor_layers
    task: combine_deckgl_map_layers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}
      grouped_layers: ${{ workflow.generate_motor_layers.return }}

  - name: Draw motor patrols map
    id: draw_motor_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_motor_layers.return }}
      view_state: ${{ workflow.global_zoom_value.return }}

  - name: Rewrite motor patrols file urls
    id: rewrite_motor_patrol_urls
    task: rewrite_file_urls_for_screenshots
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      html: ${{ workflow.draw_motor_map.return }}
      file_urls:
        - ${{ workflow.persist_motor_geojson.return }}

  - name: Persist motor patrols map HTML
    id: persist_motor_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.rewrite_motor_patrol_urls.return }}
      filename: motorbike_patrols_map.html

  # ---- COMBINED TRAJECTORIES ----

  - name: Merge motorbike, vehicle and foot patrol trajectories 
    id: merge_trajs 
    task: ecoscope_workflows_ext_mnc.tasks.merge_multiple_df
    partial:
      list_df:
        - ${{ workflow.foot_trajs.return }}
        - ${{ workflow.vehicle_trajs.return }}
        - ${{ workflow.motor_trajs.return }}
      ignore_index: true
      sort: false

  - name: Rename merged trajectory columns 
    id: rename_combined_trajs
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      raise_if_not_found: true
      drop_columns:
        - heading
        - extra__created_at
        - extra__id 
      retain_columns: []
      rename_columns:
        extra__patrol_start_time: patrol_start_time
        extra__patrol_end_time: patrol_end_time
        extra__patrol_id: patrol_id
        extra__patrol_serial_number: patrol_serial_number
        extra__patrol_status: patrol_status
        extra__patrol_subject: patrol_subject_name
        extra__patrol_title: patrol_title 
        extra__patrol_type: patrol_type_id
        extra__patrol_type__value: patrol_type_value 
        extra__subject_id: subject_id
        extra__participants: participants 
      df: ${{ workflow.merge_trajs.return }}

  - name: Persist combined trajectories data 
    id: persist_trajectories_data
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: geoparquet
      df: ${{ workflow.rename_combined_trajs.return }}
      filename: patrol_trajectories

  - name: Summarize overall ranger patrol metrics
    id: ranger_patrol_metrics
    task: summarize_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      groupby_cols:
        - participants
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
          decimal_places: 0 
        - display_name: distance_km
          aggregator: sum
          column: dist_meters
          original_unit: m
          new_unit: km
          decimal_places: 2
        - display_name: duration_hrs
          aggregator: sum
          column: timespan_seconds
          original_unit: s
          new_unit: h
          decimal_places: 2
      reset_index: true
      df: ${{ workflow.rename_combined_trajs.return }}

  - name: Replace nulls with unspecified
    id: replace_ranger_nulls
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.ranger_patrol_metrics.return }}
      columns: 
        - participants
      label: Unspecified

  - name: Add totals row to overall patrol metrics
    id: add_ranger_metrics_totals
    task: add_totals_row
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      label_col: 
        - participants
      label: Total 
      df: ${{ workflow.replace_ranger_nulls.return }}

  - name: Persist total patrol coverage 
    id: persist_total_df
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.add_ranger_metrics_totals.return }}
      filename: overall_patrol_efforts

  - name: Compute patrol visits 
    id: patrol_grid_visits
    task: create_patrol_coverage_grid
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      grid_cell_size: 1000
      trajs: ${{ workflow.rename_combined_trajs.return }}

  - name: Apply bin classification on grids
    id: apply_classification_grid
    task: apply_classification
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: unique_patrol_count
      output_column_name: density_bins 
      label_options:
        label_ranges: false
        label_decimals: 1
      classification_options:
        k: 5
        scheme: "equal_interval"
      df: ${{ workflow.patrol_grid_visits.return }}

  - name: Apply Colormap to patrol grid visits
    id: apply_grid_colormap
    task: apply_color_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      input_column_name: density_bins
      colormap: RdYlGn_r
      output_column_name: density_colors
      df: ${{ workflow.apply_classification_grid.return }}

  - name: Create patrol visit grid layers
    id: generate_grid_layers
    task: create_geojson_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      layer_style: 
        filled: true 
        stroked: true 
        extruded: false 
        wireframe: false
        get_fill_color: density_colors
        get_line_color: [0, 0, 0]
        opacity: 0.75 
        get_line_width: 0.85
        get_elevation: 0
        get_point_radius: 1
        line_width_units: pixels 
        line_width_scale: 1 
        line_width_min_pixels: 1
        line_width_max_pixels: 5
      legend:
        title: Visits
        label_column: density_bins
        color_column: density_colors
      geodataframe: ${{ workflow.apply_grid_colormap.return }}
      data_url: null

  - name: Combine styled layers with patrol coverage
    id: combine_grid_layers
    task: combine_deckgl_map_layers
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      static_layers: 
        - ${{ workflow.create_conservancy_boundaries.return }}
        - ${{ workflow.create_mnc_parcels_layers.return }}
        - ${{ workflow.conservancy_text_layer.return }}
      grouped_layers: ${{ workflow.generate_grid_layers.return }}

  - name: Draw patrol coverage map
    id: draw_grid_map
    task: draw_map
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
      geo_layers: ${{ workflow.combine_grid_layers.return }}
      view_state: ${{ workflow.global_zoom_value.return }}

  - name: Persist patrol coverage map HTML
    id: persist_grid_urls
    task: persist_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      text: ${{ workflow.draw_grid_map.return }}
      filename: patrol_coverage_map.html

  - name: Compute patrol occupancy
    id: compute_patrol_occupancy
    task: compute_occupancy 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      coverage_grid_gdf: ${{ workflow.patrol_grid_visits.return }}
      regions_gdf: ${{ workflow.conservancy_gdf.return }}
      crs: epsg:4326
  
  - name: Round off values to two decimal places
    id: round_off_patrol
    task: round_values
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:  
      df: ${{ workflow.compute_patrol_occupancy.return }}
      column: occupancy_percentage 
      decimals: 2
  
  - name: Persist occupancy df 
    id: persist_occupancy_df
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.round_off_patrol.return }}
      filename: patrol_coverage

  - name: Convert grid map to png
    id: convert_grid_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_grid_urls.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1

  - name: Convert vehicle patrol map to png
    id: convert_vehicle_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_vehicle_urls.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1
        serve_local_files: true

  - name: Convert motor patrol map to png
    id: convert_motor_png
    task: html_to_png
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      html_path: ${{ workflow.persist_motor_urls.return }}
      config:
        full_page: false
        device_scale_factor: 2.0
        wait_for_timeout: 40000
        max_concurrent_pages: 1
        serve_local_files: true

  - name: Download MNC Template and persist
    id: fetch_mnc_template
    task: fetch_and_persist_file
    partial:
      url: https://www.dropbox.com/scl/fi/tx4fdlikfsijgw8jkugnr/mara_north_event_template.docx?rlkey=pvyu3y7ibpphbqlqc6u1pns3t&st=fufzxuyy&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false
  
  - name: Generate report 
    id: generate_report 
    task: generate_mnc_report 
    partial: 
      template_path: ${{ workflow.fetch_mnc_template.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      generated_by: "Ecoscope"
      validate_images: true 
      time_period: ${{ workflow.time_range.return }}
      filename: "overall_report.docx"

  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}