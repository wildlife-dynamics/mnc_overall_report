  - name: Get patrol values from patrol information 
    id: get_patrols_from_info
    task: get_patrol_values 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      events_df : ${{ workflow.explode_patrol_columns.return }}
      patrols_column: patrol_id 
      client: ${{ workflow.er_client_name.return }}
      batch_size: 15

  - name: Get patrol observations from patrol df 
    id: get_patrol_obs 
    task: custom_get_patrol_observations_from_patrols_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      client: ${{ workflow.er_client_name.return }}
      patrols_df : ${{ workflow.get_patrols_from_info.return }}
      include_patrol_details: true 
      raise_on_empty: true
      sub_page_size: 150

  - name: Drop values from patrol information df 
    id: drop_values_patrol_info 
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      raise_if_not_found: true
      drop_columns: 
        - geometry 
        - reported_by
        - index 
        - serial_number 
      retain_columns: []
      rename_columns: 
        authorized_by: authorized_by
        event_details__updates: updates
      df: ${{ workflow.explode_patrol_columns.return }}

  - name: Merge dataframes
    id: merge_patrol_events_obs 
    task: merge_dataframes
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      left_df: ${{ workflow.get_patrol_obs.return }}
      right_df: ${{ workflow.drop_values_patrol_info.return }}
      on: patrol_id 
      how: left 
      preserve_left_index: true 

  - name: Transform observations to relocations
    id: obs_relocs
    task: process_relocations
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      observations: ${{ workflow.merge_patrol_events_obs.return }}
      relocs_columns:
        - extra__id
        - extra__created_at
        - extra__subject_id
        - geometry
        - groupby_col
        - fixtime
        - junk_status
        - patrol_id
        - patrol_title
        - patrol_serial_number
        - patrol_start_time
        - patrol_end_time
        - patrol_type
        - patrol_status
        - patrol_subject
        - patrol_type__value
        - participants
        - purpose
        - transport_type
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Persist patrol observations as relocations 
    id: persist_relocs
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
