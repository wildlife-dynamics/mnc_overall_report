      reset_index: true
      df: ${{ workflow.rename_patrol_info.return }}

  - name: Capitalize patrol text 
    id: capitalize_patrol_text
    task: capitalize_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.patrol_info_summary.return }}
      column: purpose

  - name: Add totals row in patrol info summary table
    id: include_pat_totals
    task: add_totals_row
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      label_col: 
        - purpose
      label: Total
      df: ${{ workflow.capitalize_patrol_text.return }}

  - name: Persist patrol summary table 
    id: persist_patrol_df
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      filename: patrol_purpose_summary
