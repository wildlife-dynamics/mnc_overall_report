    partial:
      relocations: ${{ workflow.filter_vehicle_patrols.return }}
      trajectory_segment_filter:
        min_length_meters: 0.35
        max_length_meters: 5000.0
        max_time_secs: 18000.0
        min_time_secs: 1.0
        max_speed_kmhr: 100.0
        min_speed_kmhr: 10.0
      
  - name: Convert motorbike relocations to trajectories
    id: motor_trajs
