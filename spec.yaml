      filename: patrol_relocations
      df: ${{ workflow.obs_relocs.return }}

  - name: Filter foot patrol observations 
    id: filter_foot_patrols
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: transport_type
      op: equal
      value: foot
      df:  ${{ workflow.obs_relocs.return }}
      reset_index: false

  - name: Filter vehicle patrol observations 
    id: filter_vehicle_patrols
